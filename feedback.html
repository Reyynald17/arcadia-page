<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arcadia | Feedback System</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Poppins:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-background: #000000;
            --color-text-light: #FFFFFF;
            --color-cta-main: #3C72A8;
            --font-headline: 'Poppins', sans-serif;
            --font-body: 'Montserrat', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--color-background);
            color: var(--color-text-light);
            font-family: var(--font-body);
            line-height: 1.6;
            overflow-x: hidden;
        }

        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--color-background);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease-out, visibility 0.5s;
        }

        #splash-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loading-circle {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--color-cta-main);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            height: 70px;
            background-color: rgba(0, 0, 0, 0.95);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
        }

        .logo-container {
            height: 40px;
            display: flex;
            align-items: center;
        }

        .logo {
            height: 100%;
            width: auto;
        }

        .main-nav {
            display: flex;
            gap: 20px;
        }

        .nav-button {
            color: var(--color-text-light);
            text-decoration: none;
            font-family: var(--font-headline);
            font-size: 0.85em;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .nav-button.active {
            color: var(--color-cta-main);
        }

        .content-section {
            padding: 120px 20px 60px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .headline-title {
            font-family: var(--font-headline);
            font-size: clamp(1.5rem, 8vw, 2.5rem);
            text-align: center;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .feedback-card {
            width: 100%;
            max-width: 600px;
            background: #0a0a0a;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 0.75em;
            color: var(--color-cta-main);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .form-control {
            background: #000;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 15px;
            font-family: var(--font-body);
            font-size: 0.9em;
            transition: 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--color-cta-main);
        }

        .submit-btn {
            background: var(--color-cta-main);
            color: #fff;
            border: none;
            padding: 15px;
            width: 100%;
            font-family: var(--font-headline);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
        }

        .submit-btn:disabled {
            background: #222;
            cursor: not-allowed;
        }

        #status-msg {
            margin-top: 20px;
            font-size: 0.85em;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @media (max-width: 768px) {
            .main-nav {
                position: fixed;
                bottom: 0;
                left: 0;
                width: 100%;
                background: #000;
                justify-content: space-around;
                padding: 20px 0;
                border-top: 1px solid rgba(255, 255, 255, 0.1);
                gap: 0;
            }
            .content-section { padding-top: 90px; }
            .feedback-card { padding: 30px 20px; border: none; }
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="loading-circle"></div>
    </div>

    <header class="main-header">
        <div class="logo-container">
            <a href="index.html">
                <img src="logo.png" alt="Arcadia" class="logo">
            </a>
        </div>
        <nav class="main-nav">
            <a href="index.html" class="nav-button">Home</a>
            <a href="team.html" class="nav-button">Devs</a>
            <a href="index.html#lore" class="nav-button">Lore</a>
            <a href="#" class="nav-button active">Feedback</a>
        </nav>
    </header>

    <main class="content-section">
        <h2 class="headline-title">Feedback System</h2>
        
        <div class="feedback-card">
            <form id="feedbackForm">
                <div class="form-group">
                    <label>Nama / Alias</label>
                    <input type="text" id="userName" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Kategori</label>
                    <select id="category" class="form-control" required>
                        <option value="Bug">Bug Report</option>
                        <option value="Saran">Saran</option>
                        <option value="Lainnya">Lainnya</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Pesan</label>
                    <textarea id="message" class="form-control" rows="5" required></textarea>
                </div>
                <button type="submit" id="submitBtn" class="submit-btn">Kirim Data</button>
            </form>
            <div id="status-msg"></div>
        </div>
    </main>

    <script>
        const BIN_ID = '6948104743b1c97be9fce750'; 
        const API_KEY = '$2a$10$M55GAQGmXXRYA96RdrzW.uAiqpU.X2JqBMvXOyp0dDkE.4zO/0dfa';

        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('splash-screen').classList.add('hidden');
            }, 600);
        });

        const form = document.getElementById('feedbackForm');
        const btn = document.getElementById('submitBtn');
        const statusMsg = document.getElementById('status-msg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            btn.disabled = true;
            btn.innerText = 'Syncing...';
            statusMsg.innerText = '';

            const newEntry = {
                name: document.getElementById('userName').value,
                category: document.getElementById('category').value,
                message: document.getElementById('message').value,
                timestamp: new Date().toISOString()
            };

            try {
                const getResponse = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    method: 'GET',
                    headers: { 'X-Master-Key': API_KEY }
                });

                const currentData = await getResponse.json();
                let feedbackList = Array.isArray(currentData.record.feedbacks) 
                    ? currentData.record.feedbacks 
                    : [];

                feedbackList.push(newEntry);

                const updateResponse = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': API_KEY
                    },
                    body: JSON.stringify({ feedbacks: feedbackList })
                });

                if (updateResponse.ok) {
                    statusMsg.style.color = '#4CAF50';
                    statusMsg.innerText = 'Data Berhasil Diarsipkan.';
                    form.reset();
                } else {
                    throw new Error();
                }
            } catch (error) {
                statusMsg.style.color = '#f44336';
                statusMsg.innerText = 'Kesalahan: Gagal Sinkronisasi Database.';
            } finally {
                btn.disabled = false;
                btn.innerText = 'Kirim Data';
            }
        });
    </script>
</body>
</html>
